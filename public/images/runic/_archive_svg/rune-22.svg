<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 486" width="280" height="486">
  <defs>

    <!-- Stone noise texture -->
    <filter id="stone" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.72 0.68" numOctaves="4"
                    stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feComponentTransfer in="mono" result="dimmed">
        <feFuncA type="linear" slope="0.28"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="dimmed" mode="multiply"/>
    </filter>

    <!-- Subtle glow around the rune -->
    <filter id="rune-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10"
                    flood-color="#9080c8" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3"
                    flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Vignette: dark edges -->
    <radialGradient id="vig" cx="50%" cy="48%" r="65%">
      <stop offset="0%"   stop-color="#251f30"  stop-opacity="0"/>
      <stop offset="100%" stop-color="#060406"     stop-opacity="0.75"/>
    </radialGradient>

    <!-- Subtle vertical gradient on bg to give slab feel -->
    <linearGradient id="slab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#251f30"  stop-opacity="0.4"/>
      <stop offset="50%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000"     stop-opacity="0.35"/>
    </linearGradient>

  </defs>

  <!-- ── Background ── -->
  <rect width="280" height="486" rx="14" fill="#1a1622"/>
  <rect width="280" height="486" rx="14" fill="#251f30" filter="url(#stone)"/>
  <rect width="280" height="486" rx="14" fill="url(#slab)"/>
  <rect width="280" height="486" rx="14" fill="url(#vig)"/>

  <!-- ── Borders ── -->
  <rect x="7"  y="7"  width="266" height="472" rx="10" fill="none"
        stroke="#504060" stroke-width="1.5"/>
  <rect x="15" y="15" width="250" height="456" rx="7"  fill="none"
        stroke="#3a2e48" stroke-width="0.75"/>

  <!-- ── Corner accents (L-shaped) ── -->
  <!-- top-left -->
  <polyline points="15,34 15,15 34,15"     fill="none" stroke="#7060a0" stroke-width="2" stroke-linecap="round"/>
  <!-- top-right -->
  <polyline points="246,15 265,15 265,34"  fill="none" stroke="#7060a0" stroke-width="2" stroke-linecap="round"/>
  <!-- bottom-left -->
  <polyline points="15,452 15,471 34,471"  fill="none" stroke="#7060a0" stroke-width="2" stroke-linecap="round"/>
  <!-- bottom-right -->
  <polyline points="246,471 265,471 265,452" fill="none" stroke="#7060a0" stroke-width="2" stroke-linecap="round"/>

  <!-- ── Roman numeral (top-center, subtle) ── -->
  <text x="140" y="40"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="13" fill="#504060"
    text-anchor="middle" letter-spacing="3">XXII</text>

  <!-- ── Rune symbol ── -->
  <text x="140" y="242"
    font-family="'Segoe UI Symbol', 'Apple Symbols', 'Noto Sans Runic', 'FreeMono', serif"
    font-size="190" fill="#d0c8e8"
    text-anchor="middle" dominant-baseline="middle"
    filter="url(#rune-glow)">ᛜ</text>

  <!-- ── Decorative divider ── -->
  <line x1="68" y1="380" x2="130" y2="380" stroke="#3a2e48" stroke-width="0.75"/>
  <circle cx="140" cy="380" r="2.5" fill="#3a2e48"/>
  <line x1="150" y1="380" x2="212" y2="380" stroke="#3a2e48" stroke-width="0.75"/>

  <!-- ── Rune name ── -->
  <text x="140" y="418"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="24" fill="#a898d0"
    text-anchor="middle" letter-spacing="6">INGWAZ</text>

  <!-- ── Aett label ── -->
  <text x="140" y="448"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="11" fill="#504060"
    text-anchor="middle" letter-spacing="2">TYR'S AETT</text>

</svg>