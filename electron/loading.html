<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tarot &amp; Oracle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      color: #8a80a0;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
    }
    .moon { font-size: 3.5rem; color: #c9a84c; margin-bottom: 1.2rem; opacity: 0.85; animation: pulse 2.4s ease-in-out infinite; }
    h1 { font-size: 1.3rem; font-weight: normal; color: #c9a84c; letter-spacing: 0.12em; margin-bottom: 0.6rem; }
    p { font-size: 0.8rem; letter-spacing: 0.08em; }
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="moon">&#9790;</div>
  <h1>Tarot &amp; Oracle</h1>
  <p>Starting up&hellip;</p>
</body>
</html>
